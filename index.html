<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia 4K Interactiva</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* Interfaz de mensajes */
        #info-overlay {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,1);
            z-index: 10;
        }

        .planet-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff4d6d;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .planet-card.active { transform: translate(-50%, -50%) scale(1); }

        .planet-card img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            margin-bottom: 15px;
        }

        .planet-card h2 { margin: 0; color: #ff4d6d; font-size: 2rem; }
        .planet-card p { font-size: 1.2rem; line-height: 1.5; }

        .btn-close {
            background: #ff4d6d;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="info-overlay">
        <h1>Nuestra Galaxia Infinita</h1>
        <p>Toca un planeta para descubrir un mensaje</p>
    </div>

    <!-- Carta para los planetas -->
    <div id="planetCard" class="planet-card">
        <div id="photoContainer"></div>
        <h2 id="planetName">Nombre</h2>
        <p id="planetMessage">Mensaje...</p>
        <button class="btn-close" onclick="closeCard()">Cerrar</button>
    </div>

    <!-- Cargamos Three.js y OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let planets = [];

        // Datos de los planetas y frases
        const planetData = [
            { name: "Mercurio", color: 0xaaaaaa, size: 0.8, dist: 15, speed: 0.02, msg: "Tan pequeño pero tan brillante como tu energía diaria." },
            { name: "Venus", color: 0xe3bb76, size: 1.5, dist: 22, speed: 0.015, msg: "Venus brilla en el cielo igual que tu sonrisa ilumina mi día." },
            { name: "Tierra", color: 0x2233ff, size: 1.6, dist: 30, speed: 0.01, msg: "En todo el mundo, no hay nadie como tú. Eres mi hogar favorito.", isEarth: true },
            { name: "Marte", color: 0xff4422, size: 1.2, dist: 38, speed: 0.008, msg: "Fuerte y valiente, nada detiene tu brillo propio." },
            { name: "Júpiter", color: 0xd39c7e, size: 3.5, dist: 55, speed: 0.005, msg: "Eres la persona con el corazón más grande del universo." },
            { name: "Saturno", color: 0xe6e0b1, size: 2.8, dist: 75, speed: 0.003, msg: "Eres tan especial que mereces anillos de diamantes por todo el cielo." }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Luz
            const sunLight = new THREE.PointLight(0xffffff, 2, 300);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // Sol (Centro)
            const sunGeo = new THREE.SphereGeometry(6, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // Estrellas de fondo 4K
            createStars();

            // Crear planetas
            planetData.forEach(data => {
                const planetGroup = new THREE.Group();
                
                // Esfera del planeta
                const geo = new THREE.SphereGeometry(data.size, 32, 32);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: data.color, 
                    metalness: 0.3, 
                    roughness: 0.7 
                });
                const mesh = new THREE.Mesh(geo, mat);
                
                mesh.userData = { 
                    name: data.name, 
                    msg: data.msg,
                    isEarth: data.isEarth || false
                };

                // Órbita visual (el aro)
                const orbitGeo = new THREE.RingGeometry(data.dist - 0.1, data.dist + 0.1, 64);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
                const orbit = new THREE.Mesh(orbitGeo, orbitMat);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);

                planetGroup.add(mesh);
                mesh.position.x = data.dist;
                
                scene.add(planetGroup);
                planets.push({ group: planetGroup, mesh: mesh, speed: data.speed });
            });

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('click', onDocumentMouseDown);
            animate();
        }

        function createStars() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 10000;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 600;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff });
            const starMesh = new THREE.Points(starGeo, starMat);
            scene.add(starMesh);
        }

        function onDocumentMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

            if (intersects.length > 0) {
                const object = intersects[0].object;
                showCard(object.userData);
            }
        }

        function showCard(data) {
            const card = document.getElementById('planetCard');
            const photoCont = document.getElementById('photoContainer');
            document.getElementById('planetName').innerText = data.name;
            document.getElementById('planetMessage').innerText = data.msg;

            // Si es la Tierra, mostramos la foto
            if(data.isEarth) {
                // AQUÍ PON EL LINK DE LA FOTO DE TU AMIGA
                photoCont.innerHTML = `<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=500" alt="Amiga">`;
            } else {
                photoCont.innerHTML = "";
            }

            card.classList.add('active');
        }

        function closeCard() {
            document.getElementById('planetCard').classList.remove('active');
        }

        function animate() {
            requestAnimationFrame(animate);
            
            planets.forEach(p => {
                p.group.rotation.y += p.speed; // Traslación (órbita)
                p.mesh.rotation.y += 0.02;     // Rotación propia
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
